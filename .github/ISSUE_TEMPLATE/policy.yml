name: Policy
description: Propose or modify a D3HR policy
title: "[Policy] "
labels: ["type:policy"]
body:
  - type: textarea
    id: policy
    attributes:
      label: Policy Proposal
      description: State the rule, scope, exceptions, and enforcement point.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk If Wrong
      description: What breaks legally, operationally, or technically?
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Required Documentation Updates
    validations:
      required: true

