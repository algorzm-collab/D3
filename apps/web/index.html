<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D3HR Persona Home Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="D3HR navigation">
        <div class="brand">
          <span class="brand-mark">D3</span>
          <div>
            <strong>D3HR</strong>
            <span>Public HR Evidence OS</span>
          </div>
        </div>
        <nav class="persona-tabs" aria-label="Persona views">
          <button class="persona-tab active" data-persona="employee">직원</button>
          <button class="persona-tab" data-persona="manager">관리자</button>
          <button class="persona-tab" data-persona="hr">HR</button>
          <button class="persona-tab" data-persona="institution_head">기관장</button>
          <button class="persona-tab" data-persona="consultant">컨설턴트</button>
          <button class="persona-tab" data-persona="benchmark">벤치마크 대시보드</button>
          <button class="persona-tab" data-persona="jobdb">직무기술서 Wiki</button>
        </nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">오늘의 D3HR</p>
            <h1 id="persona-title">직원 홈</h1>
          </div>
          <div class="status-pill" id="persona-hook">오늘 한 일이 성과와 커리어가 됩니다</div>
        </header>

        <section class="hero-panel" id="primary-panel"></section>

        <section class="grid" id="metric-grid" aria-label="Persona metrics"></section>

        <section class="two-column" id="two-column-section">
          <article class="panel">
            <h2 id="mission-title">오늘의 미션</h2>
            <ul class="task-list" id="mission-list"></ul>
          </article>
          <article class="panel">
            <h2>데이터 연계</h2>
            <ol class="data-flow" id="data-flow"></ol>
          </article>
        </section>

        <!-- Enterprise SaaS JobDB Wiki workspace -->
        <section id="jobdb-workspace" style="display: none;">
          <div class="wiki-header">
            <div>
              <h2 class="wiki-subtitle">KORAD 2024년 일반직 직무기술서 표준 데이터셋</h2>
            </div>
            <div class="lang-toggle-container">
              <button class="lang-toggle active" id="lang-ko-btn" type="button">한글</button>
              <button class="lang-toggle" id="lang-en-btn" type="button">ENG</button>
            </div>
          </div>
          
          <div class="wiki-layout">
            <aside class="wiki-sidebar">
              <input type="text" id="wiki-search" placeholder="직무명 또는 직렬 검색..." />
              <ul class="wiki-job-list" id="wiki-job-list-ul"></ul>
            </aside>
            <main class="wiki-detail" id="wiki-detail-panel">
              <div class="detail-empty">직무를 선택하시면 상세 정보가 표시됩니다.</div>
            </main>
          </div>
        </section>
      </section>
    </main>

    <script src="./src/persona-home.js"></script>
  </body>
</html>
